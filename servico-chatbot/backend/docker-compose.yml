services:
  postgres:
    image: postgres:16-alpine
    container_name: chatbot-postgres
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot123
      POSTGRES_DB: chatbot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot -d chatbot_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chatbot-network

  chatbot-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbot-api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: chatbot
      DB_PASSWORD: chatbot123
      DB_NAME: chatbot_db
      SERVER_PORT: 8080
      GRPC_CRAWLER_HOST: webcrawler-api
      GRPC_CRAWLER_ADMIN_PORT: 50051
      GRPC_CRAWLER_SEARCH_PORT: 50052
      GRPC_TIMEOUT: 30
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chatbot-network
      - webcrawler-network
    volumes:
      - ./logs:/app/logs

volumes:
  postgres_data:

networks:
  chatbot-network:
    driver: bridge
  webcrawler-network:
    external: true